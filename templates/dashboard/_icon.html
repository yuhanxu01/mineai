{% with s=size|default:16 %}
<svg class="icon {{ class|default:'' }}" width="{{ s }}" height="{{ s }}" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  {% if name == "bolt" %}
    <path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z" />
  {% elif name == "home" %}
    <path d="M3 11l9-7 9 7" />
    <path d="M5 10v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V10" />
  {% elif name == "user" %}
    <circle cx="12" cy="8" r="4" />
    <path d="M4 20c2-4 6-6 8-6s6 2 8 6" />
  {% elif name == "settings" %}
    <path d="M4 6h16" />
    <circle cx="9" cy="6" r="2" />
    <path d="M4 12h16" />
    <circle cx="15" cy="12" r="2" />
    <path d="M4 18h16" />
    <circle cx="11" cy="18" r="2" />
  {% elif name == "lock" %}
    <rect x="4" y="11" width="16" height="9" rx="2" />
    <path d="M8 11V7a4 4 0 0 1 8 0v4" />
  {% elif name == "pen" %}
    <path d="M3 21l4-1 11-11-3-3L4 17l-1 4z" />
    <path d="M13 6l3 3" />
  {% elif name == "book" %}
    <path d="M4 5h7a3 3 0 0 1 3 3v12a3 3 0 0 0-3-3H4z" />
    <path d="M20 5h-7a3 3 0 0 0-3 3v12a3 3 0 0 1 3-3h7z" />
  {% elif name == "chat" %}
    <path d="M4 6h16a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H9l-5 4v-4H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" />
  {% elif name == "search" %}
    <circle cx="11" cy="11" r="6" />
    <path d="M20 20l-3.5-3.5" />
  {% elif name == "grid" %}
    <rect x="4" y="4" width="7" height="7" rx="1" />
    <rect x="13" y="4" width="7" height="7" rx="1" />
    <rect x="4" y="13" width="7" height="7" rx="1" />
    <rect x="13" y="13" width="7" height="7" rx="1" />
  {% elif name == "save" %}
    <path d="M4 4h12l4 4v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
    <path d="M8 4v6h8" />
    <path d="M8 20v-6h8v6" />
  {% elif name == "box" %}
    <path d="M12 2l8 4-8 4-8-4 8-4z" />
    <path d="M4 6v10l8 4 8-4V6" />
  {% elif name == "mail" %}
    <rect x="3" y="6" width="18" height="12" rx="2" />
    <path d="M3 7l9 6 9-6" />
  {% elif name == "download" %}
    <path d="M12 8v8" />
    <path d="M8 12l4 4 4-4" />
    <path d="M4 20h16" />
  {% elif name == "upload" %}
    <path d="M12 16V6" />
    <path d="M8 10l4-4 4 4" />
    <path d="M4 19h16" />
  {% elif name == "hash" %}
    <path d="M5 9h14" />
    <path d="M4 15h14" />
    <path d="M10 3L8 21" />
    <path d="M16 3l-2 18" />
  {% elif name == "spark" %}
    <path d="M12 3l2.2 5.2L20 10l-5.8 1.8L12 17l-2.2-5.2L4 10l5.8-1.8z" />
  {% elif name == "layers" %}
    <path d="M12 3l9 5-9 5-9-5 9-5z" />
    <path d="M3 12l9 5 9-5" />
    <path d="M3 17l9 5 9-5" />
  {% elif name == "key" %}
    <circle cx="7" cy="12" r="3" />
    <path d="M10 12h11" />
    <path d="M18 12v3" />
    <path d="M15 12v3" />
  {% elif name == "check" %}
    <path d="M5 13l4 4L19 7" />
  {% elif name == "error" %}
    <circle cx="12" cy="12" r="9" />
    <path d="M9 9l6 6" />
    <path d="M15 9l-6 6" />
  {% elif name == "info" %}
    <circle cx="12" cy="12" r="9" />
    <path d="M12 10v6" />
    <circle cx="12" cy="7" r="1" />
  {% elif name == "star" %}
    <path d="M12 3l2.5 5 5.5.8-4 3.9.9 5.5-4.9-2.6-4.9 2.6.9-5.5-4-3.9 5.5-.8z" />
  {% else %}
    <rect x="4" y="4" width="7" height="7" rx="1" />
    <rect x="13" y="4" width="7" height="7" rx="1" />
    <rect x="4" y="13" width="7" height="7" rx="1" />
    <rect x="13" y="13" width="7" height="7" rx="1" />
  {% endif %}
</svg>
{% endwith %}
