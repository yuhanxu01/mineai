<!-- 懒加载器：按需 Babel 编译并 eval 到全局作用域 -->
<script>
window.__lazyLoadedSlugs = new Set();
window.__lazyLoadPromises = {};

window.lazyLoadApp = function(slug) {
  if (window.__lazyLoadPromises[slug]) return window.__lazyLoadPromises[slug];

  var script = document.querySelector(
    'script[type="text/babel-lazy"][data-apps~="' + slug + '"]'
  );
  if (!script) return Promise.resolve();

  var promise = new Promise(function(resolve, reject) {
    try {
      var result = Babel.transform(script.textContent, {
        presets: ['env', 'react'],
        filename: slug + '.jsx'
      });
      // 去掉 "use strict" 后再间接 eval：
      // 严格模式下 eval 内的函数声明不会提升到全局，去掉后才能注册到 window
      var code = result.code;
      if (code.startsWith('"use strict";')) code = code.slice(13);
      (0, eval)(code);
      (script.dataset.apps || slug).split(/\s+/).forEach(function(s) {
        s = s.trim();
        if (s) {
          window.__lazyLoadedSlugs.add(s);
          window.__lazyLoadPromises[s] = Promise.resolve();
        }
      });
      resolve();
    } catch(err) {
      console.error('[LazyLoad] 编译失败 ' + slug + ':', err);
      reject(err);
    }
  });

  (script.dataset.apps || slug).split(/\s+/).forEach(function(s) {
    s = s.trim();
    if (s) window.__lazyLoadPromises[s] = promise;
  });
  return promise;
};
</script>
