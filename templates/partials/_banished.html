// ── Toast Notification System ────────────────────────────────────────
const BToastCtx=React.createContext(null);
function BanishedToastProvider({children}){
  const[toasts,setToasts]=React.useState([]);
  const addToast=React.useCallback((msg,type='info',duration=4000)=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),duration);
  },[]);
  return(
    <BToastCtx.Provider value={addToast}>
      {children}
      <div style={{position:'fixed',top:52,right:12,zIndex:9999,display:'flex',flexDirection:'column',gap:6,pointerEvents:'none',maxWidth:340}}>
        {toasts.map(t=>{
          const colors={info:['rgba(90,138,196,0.18)','rgba(90,138,196,0.5)','#5a8ac4'],success:['rgba(78,200,122,0.18)','rgba(78,200,122,0.5)','#4ec87a'],warning:['rgba(212,154,90,0.18)','rgba(212,154,90,0.5)','#d49a5a'],danger:['rgba(196,90,90,0.18)','rgba(196,90,90,0.5)','#c45a5a']};
          const[bg,bc,fc]=colors[t.type]||colors.info;
          return <div key={t.id} style={{padding:'8px 14px',background:bg,border:`1px solid ${bc}`,borderRadius:8,color:fc,fontSize:12,fontWeight:500,backdropFilter:'blur(8px)',boxShadow:'0 4px 12px rgba(0,0,0,0.3)',pointerEvents:'auto',animation:'slideIn 0.25s ease-out'}}>{t.msg}</div>;
        })}
      </div>
    </BToastCtx.Provider>
  );
}
function useBToast(){return React.useContext(BToastCtx);}

// ── HUD ──────────────────────────────────────────────────────────────
function BanishedHUD({state,speed,onSetSpeed,onToggleRes,syncStatus,events}){
  if(!state?.time)return null;
  const {time,resources,population}=state;
  const seasonNames={spring:'春',summer:'夏',autumn:'秋',winter:'冬'};
  const SC={spring:'#4ec87a',summer:'#c9a86c',autumn:'#d49a5a',winter:'#9ab4d4'};
  const food=FOOD_KEYS.reduce((a,k)=>a+(resources[k]||0),0);
  const tickInSeason=TICK_PER_SEASON-(time.tick%TICK_PER_SEASON);
  const seasonProgress=time.tick%TICK_PER_SEASON;
  const nextSeason=B_SEASONS[(B_SEASONS.indexOf(time.season)+1)%4];
  const isWinterComing=nextSeason==='winter'&&seasonProgress>TICK_PER_SEASON*0.6;
  return(
    <div style={{position:'absolute',top:0,left:0,right:0,display:'flex',alignItems:'center',gap:8,padding:'5px 12px',background:'rgba(8,8,11,0.94)',backdropFilter:'blur(10px)',borderBottom:'1px solid rgba(201,168,108,0.2)',boxShadow:'0 2px 16px rgba(0,0,0,0.5)',zIndex:10,fontSize:13,flexWrap:'wrap'}}>
      <button className="btn btn-s btn-sm" onClick={onToggleRes} style={{padding:'4px 8px',borderRadius:'6px',background:'rgba(201,168,108,0.12)',border:'1px solid rgba(201,168,108,0.25)'}}><Icon name="menu" size={14}/></button>
      {/* Season badge */}
      <div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:6,background:`${SC[time.season]}18`,border:`1px solid ${SC[time.season]}40`}}>
        <span style={{color:SC[time.season],fontWeight:700,fontSize:13,textShadow:`0 0 8px ${SC[time.season]}`}}>{seasonNames[time.season]}</span>
        <div style={{width:32,height:4,background:'rgba(255,255,255,0.1)',borderRadius:2,overflow:'hidden'}}>
          <div style={{width:`${(seasonProgress/TICK_PER_SEASON)*100}%`,height:'100%',background:SC[time.season],borderRadius:2,transition:'width 0.3s'}}/>
        </div>
      </div>
      {isWinterComing&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'rgba(154,180,212,0.2)',color:'#9ab4d4',fontWeight:600,animation:'blink 1.5s infinite'}}>Winter incoming!</span>}
      <span style={{color:'var(--fg3)',fontWeight:500}}>Year {time.year}</span>
      <div style={{width:1,height:20,background:'rgba(255,255,255,0.1)'}}/>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <span style={{display:'flex',alignItems:'center',gap:3,color:'var(--fg)',fontWeight:600}}><span style={{fontSize:10,color:'var(--fg3)'}}>Pop</span>{population.total}</span>
        <span style={{display:'flex',alignItems:'center',gap:3,color:'var(--gold)',fontWeight:700}}><span style={{fontSize:10,color:'var(--fg3)'}}>Gold</span>{resources.gold||0}</span>
        <span style={{display:'flex',alignItems:'center',gap:3,color:'var(--fg2)'}}><span style={{fontSize:10,color:'var(--fg3)'}}>Wood</span>{resources.logs||0}</span>
        <span style={{display:'flex',alignItems:'center',gap:3,color:'var(--fg2)'}}><span style={{fontSize:10,color:'var(--fg3)'}}>Stone</span>{resources.stone||0}</span>
        <span style={{display:'flex',alignItems:'center',gap:3,color:'#e8903a',fontWeight:500}}><span style={{fontSize:10,color:'var(--fg3)'}}>Fire</span>{resources.firewood||0}</span>
        <span style={{display:'flex',alignItems:'center',gap:3,color:'#8fd0ff',fontWeight:500}}><span style={{fontSize:10,color:'var(--fg3)'}}>Labor</span>{Math.floor(resources.labor||0)}</span>
        <span style={{display:'flex',alignItems:'center',gap:3,color:food<50?'#c45a5a':'#4ec87a',fontWeight:500}}><span style={{fontSize:10,color:'var(--fg3)'}}>Food</span>{Math.floor(food)}</span>
        <span style={{display:'flex',alignItems:'center',gap:3,color:'#ffb86b',fontWeight:500}}><span style={{fontSize:10,color:'var(--fg3)'}}>Mood</span>{Math.floor(population.avg_happiness||0)}</span>
      </div>
      <div style={{display:'flex',gap:3,marginLeft:'auto',background:'rgba(255,255,255,0.04)',padding:3,borderRadius:6}}>
        {[{s:0,label:'⏸'},{s:1,label:'1x'},{s:5,label:'5x'},{s:10,label:'10x'}].map(({s,label})=>(
          <button key={s} className={`btn btn-sm ${speed===s?'btn-p':'btn-s'}`} onClick={()=>onSetSpeed(s)} style={{padding:'3px 8px',fontSize:11,borderRadius:'4px',fontWeight:600,transition:'all 0.15s',background:speed===s?'var(--gold)':'transparent',border:'none',color:speed===s?'#000':'var(--fg2)',boxShadow:speed===s?'0 0 10px rgba(201,168,108,0.4)':'none',minWidth:s===0?28:32}}>{label}</button>
        ))}
      </div>
      {syncStatus&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:'4px',background:syncStatus.ok?'rgba(78,200,122,0.15)':'rgba(196,90,90,0.15)',color:syncStatus.ok?'#4ec87a':'#c45a5a',fontWeight:500}}>{syncStatus.ok?'✓ Synced':syncStatus.msg}</span>}
    </div>
  );
}

// ── ResourcePanel ────────────────────────────────────────────────────
function BanishedResourcePanel({state,open,onClose}){
  if(!state?.resources)return null;
  const res=state.resources;
  const groups=[
    {label:'Raw materials',keys:['logs','stone','iron','coal','labor'],color:'#5ac480',icon:'raw'},
    {label:'Processed goods',keys:['firewood','iron_tools','steel_tools'],color:'#c9a86c',icon:'crafted'},
    {label:'Food',keys:FOOD_KEYS,color:'#3eb87a',icon:'food'},
    {label:'Craft goods',keys:['wool','leather','herbs','hide_coat','wool_coat','warm_coat'],color:'#d49a5a',icon:'crafted'},
    {label:'Currency',keys:['gold'],color:'#ffd700',icon:'gold'},
  ];
  const seasonName={spring:'Spring',summer:'Summer',autumn:'Autumn',winter:'Winter'};
  const prodBuildings=(state.buildings||[]).filter(b=>b.built&&b.workers_max>0);
  return(
    <div style={{position:'absolute',left:open?0:'-220px',top:46,bottom:0,width:200,background:'var(--bg2)',borderRight:'1px solid rgba(201,168,108,0.2)',overflowY:'auto',transition:'left 0.25s cubic-bezier(0.4,0,0.2,1)',zIndex:9,padding:'12px',boxShadow:'2px 0 20px rgba(0,0,0,0.5)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,paddingBottom:8,borderBottom:'1px solid rgba(201,168,108,0.15)'}}>
        <span style={{fontWeight:700,fontSize:14,color:'var(--gold)'}}>Resources</span>
        <button className="btn btn-s btn-sm" onClick={onClose} style={{padding:'4px 6px',borderRadius:'6px',background:'rgba(255,255,255,0.06)'}}><Icon name="x" size={13}/></button>
      </div>
      {groups.map(g=>(
        <div key={g.label} style={{marginBottom:14}}>
          <div style={{fontSize:11,color:g.color,fontWeight:600,marginBottom:6}}>{g.label}</div>
          {g.keys.filter(k=>(res[k]||0)>0||k==='gold').map(k=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13,marginBottom:4,padding:'4px 6px',borderRadius:'4px',background:'rgba(255,255,255,0.02)',transition:'background 0.2s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.06)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.02)'}>
              <span style={{color:'rgba(255,255,255,0.9)'}}>{RESOURCE_LABELS[k]||k}</span>
              <span style={{color:k==='gold'?'#ffd700':k==='food'?'#3eb87a':k==='firewood'?'#ff8c42':'rgba(255,255,255,0.95)',fontWeight:600}}>{Math.floor(res[k]||0)}</span>
            </div>
          ))}
        </div>
      ))}
      {prodBuildings.length>0&&(
        <div style={{marginTop:8,paddingTop:10,borderTop:'1px solid rgba(201,168,108,0.12)'}}>
          <div style={{fontSize:11,color:'var(--gold)',fontWeight:700,marginBottom:8}}>Quarterly production overview</div>
          {prodBuildings.slice(0,12).map(b=>{
            const bd=BUILDINGS_DATA[b.type];
            return(
              <div key={b.id} style={{fontSize:11,marginBottom:6,padding:'5px 6px',borderRadius:5,background:'rgba(255,255,255,0.03)'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{color:'rgba(255,255,255,0.88)'}}>{bd?.name||b.type}</span>
                  <span style={{color:'#8fd0ff'}}>This season {Math.floor(b.yield_current_total||0)}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',color:'rgba(255,255,255,0.5)'}}>
                  <span>Last season ({seasonName[b.yield_last_season]||'-'})</span>
                  <span>{Math.floor(b.yield_last_total||0)}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── BuildPanel ───────────────────────────────────────────────────────
function BanishedBuildPanel({state,buildMode,onSetBuild,onCancel}){
  const [cat,setCat]=React.useState('housing');
  const res=state?.resources||{};
  const canAfford=cost=>Object.entries(cost).every(([r,a])=>(res[r]||0)>=a);
  const catColors={housing:'#5ac480',resource:'#c9a86c',food:'#4ec87a',storage:'#9ab4d4',trade:'#d49a5a',service:'#5a8ac4',transport:'#8d8d8d'};
  return(
    <div style={{position:'absolute',right:0,bottom:44,width:230,background:'var(--bg2)',border:'1px solid rgba(201,168,108,0.2)',borderBottom:'none',borderRight:'none',borderTopLeftRadius:'12px',zIndex:9,maxHeight:'65vh',overflowY:'auto',boxShadow:'-2px -2px 20px rgba(0,0,0,0.5)'}}>
      <div style={{padding:'8px',borderBottom:'1px solid rgba(201,168,108,0.12)',display:'flex',gap:4,flexWrap:'wrap',background:'rgba(201,168,108,0.05)',position:'sticky',top:0}}>
        {Object.entries(B_CATS).map(([k,v])=>(
          <button key={k} className={`btn btn-sm ${cat===k?'btn-p':'btn-s'}`} onClick={()=>setCat(k)} style={{fontSize:11,padding:'4px 8px',borderRadius:'6px',fontWeight:600,background:cat===k?catColors[k]||'#5ac480':'rgba(255,255,255,0.06)',border:cat===k?'none':'1px solid rgba(255,255,255,0.1)',color:cat===k?'#fff':'rgba(255,255,255,0.7)',transition:'all 0.2s'}}>{v.name}</button>
        ))}
        {buildMode&&<button className="btn btn-d btn-sm" onClick={onCancel} style={{fontSize:11,padding:'4px 8px',borderRadius:'6px',fontWeight:600,marginLeft:'auto',background:'rgba(196,90,90,0.2)',border:'1px solid rgba(196,90,90,0.3)',color:'#c45a5a'}}>Cancel</button>}
      </div>
      <div style={{padding:8}}>
        {Object.entries(BUILDINGS_DATA).filter(([,b])=>b.cat===cat).map(([type,b])=>{
          const ok=canAfford(b.cost);
          const selected=buildMode===type;
          return(
            <div key={type} onClick={()=>ok&&onSetBuild(type)} style={{padding:'10px',marginBottom:6,borderRadius:'8px',border:`1.5px solid ${selected?(catColors[cat]||'#5ac480'):'rgba(255,255,255,0.1)'}`,cursor:ok?'pointer':'not-allowed',opacity:ok?1:0.45,background:selected?`${(catColors[cat]||'#5ac480')}20`:'rgba(255,255,255,0.03)',transition:'all 0.2s',boxShadow:selected?`0 0 15px ${(catColors[cat]||'#5ac480')}40`:'none'}} onMouseEnter={e=>{if(ok&&!selected)e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.transform='translateX(-2px)';}} onMouseLeave={e=>{if(ok&&!selected)e.currentTarget.style.background='rgba(255,255,255,0.03)';e.currentTarget.style.transform='translateX(0)';}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:4,color:selected?(catColors[cat]||'#5ac480'):'rgba(255,255,255,0.95)'}}>{b.name}</div>
              <div style={{fontSize:11,color:ok?'rgba(255,255,255,0.6)':'rgba(196,90,90,0.8)',marginBottom:3}}>{Object.entries(b.cost).map(([r,a])=>`${RESOURCE_LABELS[r]||r}:${a}`).join(' ')||'Free'}</div>
              {b.workers>0&&<div style={{fontSize:10,color:'rgba(255,255,255,0.5)',display:'flex',alignItems:'center',gap:4}}>Workers: {b.workers}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── InfoPanel ────────────────────────────────────────────────────────
function BanishedInfoPanel({selBuilding,selVillager,onClose,onUpgradeBlacksmith,onSetForesterMode,time}){
  if(!selBuilding&&!selVillager)return null;
  const Bar=({val,max,color,label})=>(
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
      <span style={{fontSize:11,width:36,color:'rgba(255,255,255,0.7)',fontWeight:500}}>{label}</span>
      <div style={{height:8,background:'rgba(255,255,255,0.08)',borderRadius:4,flex:1,overflow:'hidden',boxShadow:'inset 0 1px 3px rgba(0,0,0,0.3)'}}>
        <div style={{height:'100%',width:`${Math.max(0,Math.min(100,(val/max)*100))}%`,background:`linear-gradient(90deg,${color},${color}dd)`,borderRadius:4,transition:'width 0.3s',boxShadow:`0 0 10px ${color}40`}}/>
      </div>
      <span style={{fontSize:11,width:28,textAlign:'right',fontWeight:600,color:color}}>{Math.floor(val||0)}</span>
    </div>
  );
  if(selVillager){
    const v=selVillager;
    const moodColor=(v.happiness||0)>=70?'#4ec87a':(v.happiness||0)>=50?'#d4b06a':(v.happiness||0)>=35?'#d4905a':'#c45a5a';
    const lifeStage=(v.age||0)<10?'Child':(v.age||0)<18?'Student':(v.age||0)<55?'Adult':'Elder';
    const roleLabel=(typeof JOB_LABELS!=='undefined'&&v.job&&JOB_LABELS[v.job])||v.job||lifeStage;
    return(
      <div style={{position:'absolute',bottom:44,left:0,width:250,background:'var(--bg2)',border:'1px solid rgba(201,168,108,0.25)',borderRadius:'0 12px 0 0',padding:14,zIndex:9,boxShadow:'0 -4px 24px rgba(0,0,0,0.5)',backdropFilter:'blur(8px)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,paddingBottom:8,borderBottom:'1px solid rgba(201,168,108,0.15)'}}>
          <div>
            <span style={{fontWeight:700,fontSize:15,color:'var(--fg)'}}>{v.name}</span>
            <span style={{fontSize:13,color:'var(--fg3)',marginLeft:6}}>({v.age})</span>
          </div>
          <button className="btn btn-s btn-sm" onClick={onClose} style={{padding:'4px 6px',borderRadius:'6px',background:'rgba(255,255,255,0.06)'}}><Icon name="x" size={13}/></button>
        </div>
        <div style={{display:'inline-block',fontSize:11,padding:'3px 8px',borderRadius:'4px',background:`${VILLAGER_COLORS[v.state]||'#888'}20`,color:VILLAGER_COLORS[v.state]||'rgba(255,255,255,0.7)',fontWeight:600,marginBottom:10,border:`1px solid ${VILLAGER_COLORS[v.state]||'#888'}40`}}>{v.state}</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,0.72)',marginBottom:8}}>
          Role: <strong style={{color:'var(--gold)'}}>{roleLabel}</strong>
        </div>
        <div style={{marginTop:10}}>
          <Bar val={v.hunger||0} max={100} color="#e88a1a" label="Hunger"/>
          <Bar val={v.thirst||0} max={100} color="#5ad4e8" label="Thirst"/>
          <Bar val={v.warmth||0} max={100} color="#9ab4d4" label="Warmth"/>
          <Bar val={v.health||100} max={100} color="#3eb87a" label="Health"/>
          <Bar val={v.happiness||0} max={100} color={moodColor} label="Mood"/>
        </div>
        <div style={{fontSize:11,color:moodColor,marginTop:2,fontWeight:700}}>
          Mood: {v.mood_tag||'Stable'}
        </div>
        <div style={{fontSize:10,color:'rgba(255,255,255,0.55)',marginTop:3}}>
          Affected by hunger, thirst, warmth, health, family, and housing
        </div>
        {v.educated&&<div style={{marginTop:8,fontSize:11,padding:'6px 10px',background:'rgba(90,138,196,0.15)',borderRadius:'6px',color:'#5a8ac4',fontWeight:600,display:'flex',alignItems:'center',gap:6,border:'1px solid rgba(90,138,196,0.3)'}}>Educated - Efficiency x2</div>}

    );
  }
  const b=selBuilding,bd=BUILDINGS_DATA[b.type];
  const seasonName={spring:'春',summer:'夏',autumn:'秋',winter:'冬'};

  const hasWorkRange=['woodcutter','forester','mine','quarry','gatherer','hunter','fishing_dock','herbalist'].includes(b.type);
  const workRange=8;
  const storageUsed=Math.floor(b.storage_used||0);
  const storageCap=Math.max(1,Math.floor(b.storage_cap||0));
  const storageEntries=Object.entries(b.storage||{}).filter(([,n])=>(n||0)>0).sort((a,b)=>b[1]-a[1]);

    <div style={{position:'absolute',bottom:44,left:0,width:250,background:'var(--bg2)',border:'1px solid rgba(201,168,108,0.25)',borderRadius:'0 12px 0 0',padding:14,zIndex:9,boxShadow:'0 -4px 24px rgba(0,0,0,0.5)',backdropFilter:'blur(8px)'}}>

      {!b.built&&(
        <div style={{marginBottom:10}}>

            <div style={{height:'100%',width:`${(b.progress||0)*100}%`,background:'linear-gradient(90deg,#5ac480,#3eb87a)',borderRadius:5,transition:'width 0.3s',boxShadow:'0 0 10px rgba(58,184,122,0.4)'}}/>
          </div>

      {b.built&&isHouse&&(

          </div>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.62)'}}>
            Details: {storageEntries.slice(0,8).map(([k,n])=>`${RESOURCE_LABELS[k]||k}:${Math.floor(n)}`).join(' ')||'Empty'}
          </div>

// ── MarketPanel ──────────────────────────────────────────────────────
function BanishedMarketPanel({onClose}){
  const [res,setRes]=React.useState('logs');
  const [summary,setSummary]=React.useState(null);
  const [hist,setHist]=React.useState([]);
  const [ot,setOt]=React.useState('buy');
  const [amt,setAmt]=React.useState('');
  const [price,setPrice]=React.useState('');
  const [msg,setMsg]=React.useState('');
  const load=async()=>{
    try{
      const[s,h]=await Promise.all([F(`/api/banished/market/`),F(`/api/banished/market/history/${res}/`)]);
      setSummary((s.summary||{})[res]||s);setHist(h.history||[]);
    }catch{}
  };
  React.useEffect(()=>{load();},[res]);
  const place=async()=>{
    if(!amt||!price)return;
    setMsg('');
    try{await P(`/api/banished/market/order/`,{resource:res,order_type:ot,amount:parseInt(amt),price:parseInt(price)});setMsg('✓ Order placed');setAmt('');setPrice('');load();}
    catch(e){setMsg('✗ '+e.message);}
  };
  return(
    <div style={{position:'absolute',top:'8%',left:'50%',transform:'translateX(-50%)',width:'min(500px,94vw)',maxHeight:'82vh',background:'linear-gradient(135deg,rgba(15,20,18,0.98) 0%,rgba(8,12,10,0.98) 100%)',border:'1px solid rgba(201,168,108,0.3)',borderRadius:16,overflow:'hidden',zIndex:20,display:'flex',flexDirection:'column',boxShadow:'0 8px 32px rgba(0,0,0,0.6)',backdropFilter:'blur(12px)'}}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(201,168,108,0.2)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'linear-gradient(90deg,rgba(201,168,108,0.1),transparent)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontWeight:700,fontSize:16,color:'#c9a86c'}}>Global market</span>
        </div>
        <button className="btn btn-s btn-sm" onClick={onClose} style={{padding:'5px 8px',borderRadius:'6px',background:'rgba(255,255,255,0.06)'}}><Icon name="x" size={15}/></button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:14}}>
        <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
          {['logs','stone','iron','coal','firewood','wheat','fish'].map(r=>(
            <button key={r} className={`btn btn-sm ${res===r?'btn-p':'btn-s'}`} onClick={()=>setRes(r)} style={{fontSize:11,padding:'4px 10px',borderRadius:'6px',fontWeight:600,background:res===r?'linear-gradient(135deg,#c9a86c,#b89760)':'rgba(255,255,255,0.06)',border:res===r?'none':'1px solid rgba(255,255,255,0.1)',color:res===r?'#fff':'rgba(255,255,255,0.7)'}}>{RESOURCE_LABELS[r]||r}</button>
          ))}
        </div>
        {summary&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
            <div style={{background:'linear-gradient(135deg,rgba(196,90,90,0.12),rgba(196,90,90,0.05))',border:'1px solid rgba(196,90,90,0.25)',borderRadius:10,padding:12}}>
              <div style={{fontSize:11,color:'#c45a5a',fontWeight:600,marginBottom:6,display:'flex',alignItems:'center',gap:6}}>Sell orders (top 5)</div>
              {(summary.sell_orders||[]).slice(0,5).map((o,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3,padding:'4px 6px',background:'rgba(255,255,255,0.03)',borderRadius:4}}>
                  <span style={{color:'rgba(255,255,255,0.9)'}}>{o.amount}</span><span style={{color:'#c45a5a',fontWeight:600}}>{o.price}💰</span>
                </div>
              ))}
              {!(summary.sell_orders?.length)&&<div style={{fontSize:11,color:'rgba(255,255,255,0.4)',textAlign:'center',padding:8}}>No sell orders</div>}
            </div>
            <div style={{background:'linear-gradient(135deg,rgba(58,184,122,0.12),rgba(58,184,122,0.05))',border:'1px solid rgba(58,184,122,0.25)',borderRadius:10,padding:12}}>
              <div style={{fontSize:11,color:'#3eb87a',fontWeight:600,marginBottom:6,display:'flex',alignItems:'center',gap:6}}>Buy orders (top 5)</div>
              {(summary.buy_orders||[]).slice(0,5).map((o,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3,padding:'4px 6px',background:'rgba(255,255,255,0.03)',borderRadius:4}}>
                  <span style={{color:'#3eb87a',fontWeight:600}}>{o.price}💰</span><span style={{color:'rgba(255,255,255,0.9)'}}>{o.amount}</span>
                </div>
              ))}
              {!(summary.buy_orders?.length)&&<div style={{fontSize:11,color:'rgba(255,255,255,0.4)',textAlign:'center',padding:8}}>No buy orders</div>}
            </div>
          </div>
        )}
        {summary?.last_price&&<div style={{textAlign:'center',fontSize:14,padding:10,background:'linear-gradient(90deg,transparent,rgba(201,168,108,0.15),transparent)',borderRadius:8,marginBottom:12,color:'#ffd700',fontWeight:700}}>Last trade: {summary.last_price}</div>}
        {hist.length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.6)',marginBottom:6,fontWeight:500}}>Trade history ({hist.length})</div>
            <div style={{display:'flex',alignItems:'flex-end',gap:1.5,height:44,padding:'8px',background:'rgba(255,255,255,0.02)',borderRadius:8}}>
              {hist.slice(-30).map((h,i)=>{
                const mx=Math.max(...hist.map(x=>x.price)),mn=Math.min(...hist.map(x=>x.price));
                const n=mx>mn?(h.price-mn)/(mx-mn):0.5;
                return<div key={i} style={{flex:1,height:`${Math.max(4,n*36)}px`,background:`linear-gradient(180deg,#c9a86c,#a88750)`,opacity:0.75,borderRadius:2,transition:'all 0.2s'}} title={`${h.price}💰`} onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.height=`${Math.max(6,n*38)}px`;}} onMouseLeave={e=>{e.currentTarget.style.opacity='0.75';e.currentTarget.style.height=`${Math.max(4,n*36)}px`;}}/>;
              })}
            </div>
          </div>
        )}
        <div style={{borderTop:'1px solid rgba(201,168,108,0.15)',paddingTop:12}}>
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <button className={`btn btn-sm ${ot==='buy'?'btn-p':'btn-s'}`} onClick={()=>setOt('buy')} style={{flex:1,padding:'8px',fontSize:13,borderRadius:'8px',fontWeight:600,background:ot==='buy'?'linear-gradient(135deg,#3eb87a,#2d9a62)':'rgba(255,255,255,0.06)',border:ot==='buy'?'none':'1px solid rgba(255,255,255,0.1)',color:ot==='buy'?'#fff':'rgba(255,255,255,0.7)'}}>Buy</button>
            <button className={`btn btn-sm ${ot==='sell'?'btn-d':'btn-s'}`} onClick={()=>setOt('sell')} style={{flex:1,padding:'8px',fontSize:13,borderRadius:'8px',fontWeight:600,background:ot==='sell'?'linear-gradient(135deg,#c45a5a,#a33d3d)':'rgba(255,255,255,0.06)',border:ot==='sell'?'none':'1px solid rgba(255,255,255,0.1)',color:ot==='sell'?'#fff':'rgba(255,255,255,0.7)'}}>Sell</button>
          </div>
          <div style={{display:'flex',gap:10,marginBottom:10}}>
            <div className="fg" style={{flex:1}}><label style={{fontSize:11,color:'rgba(255,255,255,0.6)',marginBottom:4,display:'block'}}>Amount</label><input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0" style={{fontSize:13,padding:'8px',borderRadius:'6px'}}/></div>
            <div className="fg" style={{flex:1}}><label style={{fontSize:11,color:'rgba(255,255,255,0.6)',marginBottom:4,display:'block'}}>Price</label><input type="number" value={price} onChange={e=>setPrice(e.target.value)} placeholder="0" style={{fontSize:13,padding:'8px',borderRadius:'6px'}}/></div>
          </div>
          <button className="btn btn-p" style={{width:'100%',fontSize:13,padding:'10px',borderRadius:'8px',fontWeight:600,background:'linear-gradient(135deg,#c9a86c,#b89760)',border:'none'}} onClick={place}>Place order</button>
          {msg&&<div style={{fontSize:12,padding:'8px',borderRadius:'6px',textAlign:'center',marginTop:8,background:msg.includes('Order placed')?'rgba(58,184,122,0.15)':'rgba(196,90,90,0.15)',color:msg.includes('Order placed')?'#3eb87a':'#c45a5a',fontWeight:500}}>{msg}</div>}
        </div>
      </div>
    </div>
  );
}

// ── AIPanel ──────────────────────────────────────────────────────────
function BanishedAIPanel({token,gameState,onClose}){
  const [active,setActive]=React.useState(false);
  const [perms,setPerms]=React.useState({build:false,assign:false,trade:false});
  const [log,setLog]=React.useState('');
  const [streaming,setStreaming]=React.useState(false);
  const toggle=async()=>{try{const r=await P(`/api/banished/ai/toggle/`,{});setActive(r.is_ai_active);}catch{}};
  const savePerms=async(p)=>{try{await P(`/api/banished/ai/permissions/`,p);setPerms(p);}catch{}};
  const run=async()=>{
    setStreaming(true);setLog('');
    try{
      for await(const chunk of streamSSE(`/api/banished/ai/action/`,{state:gameState,permissions:perms},token)){
        if(chunk.type==='reasoning')setLog(l=>l+chunk.text);
        if(chunk.type==='action')setLog(l=>l+'\n[Action] '+JSON.stringify(chunk.action));
        if(chunk.done)break;
      }
    }catch(e){setLog(l=>l+'\nError: '+e.message);}
    setStreaming(false);
  };
  return(
    <div style={{position:'absolute',top:'8%',right:0,width:'min(320px,94vw)',maxHeight:'82vh',background:'linear-gradient(135deg,rgba(15,20,18,0.98) 0%,rgba(8,12,10,0.98) 100%)',border:'1px solid rgba(90,138,196,0.3)',borderRadius:'16px 0 0 16px',overflow:'hidden',zIndex:20,display:'flex',flexDirection:'column',boxShadow:'-4px 0 24px rgba(0,0,0,0.5)',backdropFilter:'blur(12px)'}}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(90,138,196,0.2)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'linear-gradient(90deg,rgba(90,138,196,0.15),transparent)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontWeight:700,fontSize:16,color:'#5a8ac4'}}>AI Coordination</span>
        </div>
        <button className="btn btn-s btn-sm" onClick={onClose} style={{padding:'5px 8px',borderRadius:'6px',background:'rgba(255,255,255,0.06)'}}><Icon name="x" size={15}/></button>

// ── Minimap ─────────────────────────────────────────────────────────
function BanishedMinimap({state,engine,onClick}){
  const canvasRef=React.useRef(null);
  const drawRef=React.useRef(null);
  const TILE_COLORS={[B_TILE.GRASS]:'#2a3a24',[B_TILE.RIVER]:'#1e4a5a',[B_TILE.MOUNTAIN]:'#5a5a5a',[B_TILE.FOREST]:'#1a4a1a',[B_TILE.STONE]:'#6a6a6a',[B_TILE.IRON]:'#4a4a5a',[B_TILE.DIRT_ROAD]:'#4a3a28',[B_TILE.BORDER]:'#111',[B_TILE.STONE_ROAD]:'#6a6a6a',[B_TILE.WOOD_BRIDGE]:'#5a3a1a',[B_TILE.STONE_BRIDGE]:'#7a7a7a'};
  React.useEffect(()=>{
    const c=canvasRef.current;if(!c||!state?.map?.tiles)return;
    const ctx=c.getContext('2d');
    const tiles=state.map.tiles;
    const w=tiles[0]?.length||64,h=tiles.length||64;
    const scale=c.width/w;
    ctx.fillStyle='#0a0a0c';ctx.fillRect(0,0,c.width,c.height);
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      ctx.fillStyle=TILE_COLORS[tiles[y][x]]||'#2a3a24';
      ctx.fillRect(x*scale,y*scale,Math.ceil(scale),Math.ceil(scale));
    }
    // Draw buildings
    (state.buildings||[]).forEach(b=>{
      if(!b.built)return;
      ctx.fillStyle=BUILDING_COLORS[b.type]||'#888';
      const bx=b.x*scale,by=b.y*scale,bw=(b.w||2)*scale,bh=(b.h||2)*scale;
      ctx.fillRect(bx,by,Math.max(2,bw),Math.max(2,bh));
    });
    drawRef.current=()=>{
      // Viewport rect
      if(!engine)return;
      const cz=engine.zoom;
      const vx=engine.camX/cz*scale,vy=engine.camY/cz*scale;
      const vw=engine.canvas.width/cz*scale,vh=engine.canvas.height/cz*scale;
      ctx.strokeStyle='#c9a86c';ctx.lineWidth=1.5;ctx.strokeRect(vx,vy,vw,vh);
    };
    drawRef.current();
  },[state,engine]);
  // Separate effect for viewport redraw on camera move
  React.useEffect(()=>{
    if(!engine)return;
    let raf;
    const redraw=()=>{if(drawRef.current)drawRef.current();raf=requestAnimationFrame(redraw);};
    raf=requestAnimationFrame(redraw);
    return()=>cancelAnimationFrame(raf);
  },[engine]);
  const handleClick=e=>{
    if(!engine||!state?.map?.tiles)return;
    const rect=e.currentTarget.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const tiles=state.map.tiles,w=tiles[0]?.length||64,h=tiles.length||64;
    const scale=e.currentTarget.width/w;
    const tx=mx/scale,ty=my/scale;
    engine.camX=tx*engine.zoom-engine.canvas.width/2;
    engine.camY=ty*engine.zoom-engine.canvas.height/2;
    engine._clampCam();
  };
  return(
    <div style={{position:'absolute',top:46,right:6,zIndex:9,borderRadius:8,overflow:'hidden',border:'1px solid rgba(201,168,108,0.3)',boxShadow:'0 2px 12px rgba(0,0,0,0.4)',background:'rgba(0,0,0,0.6)'}}>
      <canvas ref={canvasRef} width={150} height={150} onClick={handleClick} style={{display:'block',cursor:'pointer',width:150,height:150}}/>
      <div style={{fontSize:9,color:'rgba(255,255,255,0.4)',textAlign:'center',padding:'2px 0',background:'rgba(0,0,0,0.5)'}}>Click to navigate</div>
    </div>
  );
}

function BanishedPopulationPanel({state,onSelectVillager,onClose,onSetProfessionTarget}){
  if(!state?.villagers)return null;
  const vs=state.villagers;
  const professionTargets=state.profession_targets||{};
  const[sortBy,setSortBy]=React.useState('state');
  const professionJobs=['laborer','builder','teacher','doctor','vendor','merchant','woodcutter','forester','gatherer','hunter','fishing_dock','herbalist','blacksmith','tailor','farm','orchard','pasture','mine','quarry'];
  const professionCounts={};
  vs.filter(v=>v.state!=='dead').forEach(v=>{const job=v.job||'laborer';professionCounts[job]=(professionCounts[job]||0)+1;});
  const sorted=[...vs].sort((a,b)=>{
    if(sortBy==='name')return(a.name||'').localeCompare(b.name||'');
    if(sortBy==='health')return(a.health||0)-(b.health||0);
    if(sortBy==='hunger')return(a.hunger||0)-(b.hunger||0);
    if(sortBy==='happiness')return(a.happiness||0)-(b.happiness||0);
    // by state: sick/hungry/thirsty first
    const urgency=v=>v.health<30?0:v.thirst<30?1:v.hunger<30?2:v.warmth<30?3:v.state==='idle'?4:5;
    return urgency(a)-urgency(b);

          <span style={{fontWeight:700,fontSize:15,color:'#c9a86c'}}>Population</span>

        {[['state','Status'],['name','Name'],['health','Health'],['hunger','Hunger'],['happiness','Mood']].map(([k,l])=>(
          <button key={k} className="btn btn-sm" onClick={()=>setSortBy(k)} style={{fontSize:10,padding:'3px 8px',borderRadius:4,fontWeight:sortBy===k?700:500,background:sortBy===k?'rgba(201,168,108,0.15)':'transparent',border:sortBy===k?'1px solid rgba(201,168,108,0.3)':'1px solid transparent',color:sortBy===k?'var(--gold)':'var(--fg3)',transition:'all 0.15s'}}>{l}</button>

// ── GameView ─────────────────────────────────────────────────────────
function BanishedGameView({initialState,token,onBack}){
  const canvasRef=React.useRef(null);
  const engineRef=React.useRef(null);
  const [gs,setGs]=React.useState(initialState);
  const [speed,setSpeed]=React.useState(initialState?.time?.speed||1);
  const [workerPolicy,setWorkerPolicy]=React.useState(initialState?.workerPolicy||'balanced');
  const [selBuilding,setSelBuilding]=React.useState(null);
  const [selVillager,setSelVillager]=React.useState(null);
  const [buildMode,setBuildMode]=React.useState(null);
  const [buildError,setBuildError]=React.useState(null);
  const [showRes,setShowRes]=React.useState(true);
  const [showBuild,setShowBuild]=React.useState(true);
  const [showMarket,setShowMarket]=React.useState(false);
  const [showAI,setShowAI]=React.useState(false);
  const [showSave,setShowSave]=React.useState(false);
  const [showPop,setShowPop]=React.useState(false);
  const [showLog,setShowLog]=React.useState(false);
  const [gatherType,setGatherType]=React.useState(null);
  const [syncStatus,setSyncStatus]=React.useState(null);
  const [events,setEvents]=React.useState([]);
  const [gameOver,setGameOver]=React.useState(false);
  const prevPopRef=React.useRef(initialState?.population?.total||0);
  const prevBuildingsRef=React.useRef((initialState?.buildings||[]).map(b=>b.id+b.built).join(','));
  const prevSeasonRef=React.useRef(initialState?.time?.season);
  const addToast=useBToast();
  const engineInstanceRef=React.useRef(null);

  const addEvent=(msg,type='info')=>{
    const year=gs?.time?.year||1;
    setEvents(prev=>[...prev.slice(-49),{msg,type,year}]);
  };

  React.useEffect(()=>{
    const resize=()=>{if(canvasRef.current){canvasRef.current.width=window.innerWidth;canvasRef.current.height=window.innerHeight;}};
    resize();window.addEventListener('resize',resize);return()=>window.removeEventListener('resize',resize);
  },[]);

  // Keyboard shortcuts
  React.useEffect(()=>{
    const handler=e=>{
      // Don't capture when typing in inputs
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if(e.code==='Space'){e.preventDefault();const ns=speed===0?1:0;setSpeed(ns);if(engineRef.current)engineRef.current.setSpeed(ns);}
      if(e.key==='Escape'){setBuildMode(null);setGatherType(null);if(engineRef.current)engineRef.current.cancelBuildMode();setShowMarket(false);setShowAI(false);setShowSave(false);setShowPop(false);setShowLog(false);}
      if(e.key==='b'||e.key==='B')setShowBuild(b=>!b);
      if(e.key==='m'||e.key==='M')setShowMarket(m=>!m);
      if(e.key==='p'||e.key==='P')setShowPop(p=>!p);
      if(e.key==='l'||e.key==='L')setShowLog(l=>!l);
      if(e.key==='1'){setSpeed(1);if(engineRef.current)engineRef.current.setSpeed(1);}
      if(e.key==='2'){setSpeed(5);if(engineRef.current)engineRef.current.setSpeed(5);}
      if(e.key==='3'){setSpeed(10);if(engineRef.current)engineRef.current.setSpeed(10);}
      if(e.key==='0'){setSpeed(0);if(engineRef.current)engineRef.current.setSpeed(0);}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[speed]);

  React.useEffect(()=>{
    if(!canvasRef.current||!gs)return;
    const eng=new BanishedEngine(canvasRef.current,gs,upd=>{
      if(upd.state){
        setGs(s=>{
          const newState={...s,...upd.state};
          // Event detection
          const newPop=newState.population?.total||0;
          const oldPop=prevPopRef.current;
          if(newPop<oldPop){addEvent(`Villager perished (${oldPop} → ${newPop})`,'danger');addToast(`A villager has perished! Population: ${newPop}`,'danger');if(newPop===0)setGameOver(true);}
          else if(newPop>oldPop){addEvent(`New villager! (${oldPop} → ${newPop})`,'population');addToast(`New villager born! Population: ${newPop}`,'success');}
          prevPopRef.current=newPop;
          // Building completion
          const newBKey=(newState.buildings||[]).map(b=>b.id+b.built).join(',');
          if(newBKey!==prevBuildingsRef.current){
            const oldBs=(s.buildings||[]);
            (newState.buildings||[]).forEach(nb=>{
              if(nb.built){
                const ob=oldBs.find(x=>x.id===nb.id);
                if(ob&&!ob.built){const bd=BUILDINGS_DATA[nb.type];addEvent(`${bd?.name||nb.type} completed!`,'building');addToast(`${bd?.name||nb.type} construction complete!`,'success');}
              }
            });
            prevBuildingsRef.current=newBKey;
          }
          // Season change
          const newSeason=newState.time?.season;
          if(newSeason&&newSeason!==prevSeasonRef.current){
            const sn={spring:'Spring',summer:'Summer',autumn:'Autumn',winter:'Winter'};
            addEvent(`${sn[newSeason]} has arrived (Year ${newState.time?.year})`,'season');
            if(newSeason==='winter')addToast('Winter has come! Ensure firewood supply!','warning',6000);
            prevSeasonRef.current=newSeason;
          }
          // Resource warnings
          const food=FOOD_KEYS.reduce((a,k)=>a+(newState.resources?.[k]||0),0);
          if(food<30&&food>0&&Math.random()<0.01)addToast('Food supplies critically low!','warning');
          if((newState.resources?.firewood||0)<10&&newSeason==='winter')addToast('Firewood dangerously low for winter!','danger');
          return newState;
        });
      }
      if(upd.selectedBuilding!==undefined){setSelBuilding(upd.selectedBuilding);if(upd.selectedBuilding)setSelVillager(null);}
      if(upd.selectedVillager!==undefined){setSelVillager(upd.selectedVillager);if(upd.selectedVillager)setSelBuilding(null);}
      if(upd.buildError!==undefined)setBuildError(upd.buildError);
    });
    engineRef.current=eng;
    engineInstanceRef.current=eng;
    eng.start(async(newState,prev,elapsed)=>{
      setSyncStatus({ok:false,msg:'Syncing...'});
      try{const r=await P(`/api/banished/game/sync/`,{state:newState,elapsed_seconds:elapsed});setSyncStatus({ok:true,msg:r.warnings?.length?`⚠ ${r.warnings[0]}`:'Synced'});}
      catch{setSyncStatus({ok:false,msg:'Failed'});}
    });
    return()=>eng.destroy();
  },[]);

  const handleSpeed=s=>{setSpeed(s);if(engineRef.current)engineRef.current.setSpeed(s);};
  const handleBuild=type=>{setBuildMode(type);setBuildError(null);setGatherType(null);if(engineRef.current)engineRef.current.setBuildMode(type);};
  const handleCancelBuild=()=>{setBuildMode(null);if(engineRef.current)engineRef.current.cancelBuildMode();};
  const handleGatherType=typ=>{
    if(!engineRef.current)return;
    if(gatherType===typ){engineRef.current.cancelGatheringMode();setGatherType(null);return;}
    setBuildMode(null);setGatherType(typ);engineRef.current.setGatheringMode(typ);
  };
  const handleClearGather=typ=>{if(engineRef.current)engineRef.current.clearGatheringZones(typ);};
  const handleToggleWorkerPolicy=()=>{
    const next=workerPolicy==='natural_only'?'balanced':'natural_only';
    setWorkerPolicy(next);if(engineRef.current)engineRef.current.setWorkerPolicy(next);
  };
  const handleLoad=state=>{if(engineRef.current){engineRef.current.pause();engineRef.current.destroy();}setGs(state);setGameOver(false);};
  const handleUpgradeBlacksmith=buildingId=>{
    if(!engineRef.current)return;
    const r=engineRef.current.upgradeBlacksmith(buildingId);
    if(!r?.ok)setBuildError(r?.msg||'Upgrade failed');else setBuildError(null);
  };
  const handleSetForesterMode=(buildingId,mode)=>{
    if(!engineRef.current)return;
    const r=engineRef.current.setForesterMode(buildingId,mode);
    if(!r?.ok)setBuildError(r?.msg||'Settings failed');else setBuildError(null);
  };
  const handleSetProfessionTarget=(job,count)=>{
    if(!engineRef.current)return;
    engineRef.current.setProfessionTarget(job,count);
  };
  const handleSelectVillager=v=>{setSelVillager(v);setSelBuilding(null);};

  if(gameOver)return<BanishedGameOver state={gs} onRestart={()=>{setGameOver(false);onBack();}} onBack={()=>{window.location.hash='#/';}}/>;

  const ToolBtn=({active,onClick,label,color,shortcut})=>(
    <button className={`btn btn-sm ${active?'btn-p':'btn-s'}`} onClick={onClick} title={shortcut?`${label} (${shortcut})`:label} style={{padding:'4px 10px',fontSize:11,borderRadius:'6px',fontWeight:600,background:active?(color||'var(--gold)'):'rgba(255,255,255,0.06)',border:active?'none':'1px solid rgba(255,255,255,0.12)',color:active?(color==='#5a8ac4'?'#fff':'#000'):'var(--fg2)',transition:'all 0.15s'}}>{label}</button>
  );

  return(
    <div style={{position:'relative',width:'100vw',height:'100vh',overflow:'hidden',background:'var(--bg)'}}>
      <canvas ref={canvasRef} style={{position:'absolute',top:0,left:0,cursor:buildMode?'crosshair':'default'}}/>
      <BanishedHUD state={gs} speed={speed} onSetSpeed={handleSpeed} onToggleRes={()=>setShowRes(r=>!r)} syncStatus={syncStatus}/>
      <BanishedResourcePanel state={gs} open={showRes} onClose={()=>setShowRes(false)}/>
      <BanishedMinimap state={gs} engine={engineInstanceRef.current}/>
      {showBuild&&<BanishedBuildPanel state={gs} buildMode={buildMode} onSetBuild={handleBuild} onCancel={handleCancelBuild}/>}
      <BanishedInfoPanel selBuilding={selBuilding} selVillager={selVillager} onClose={()=>{setSelBuilding(null);setSelVillager(null);}} onUpgradeBlacksmith={handleUpgradeBlacksmith} onSetForesterMode={handleSetForesterMode} time={gs?.time}/>
      {showMarket&&<BanishedMarketPanel onClose={()=>setShowMarket(false)}/>}
      {showAI&&<BanishedAIPanel token={token} gameState={gs} onClose={()=>setShowAI(false)}/>}
      {showSave&&<BanishedSavePanel currentState={gs} onLoad={handleLoad} onClose={()=>setShowSave(false)}/>}
      {showPop&&<BanishedPopulationPanel state={gs} onSelectVillager={handleSelectVillager} onClose={()=>setShowPop(false)} onSetProfessionTarget={handleSetProfessionTarget}/>}
      {showLog&&<BanishedEventLog events={events} onClose={()=>setShowLog(false)}/>}
      {buildError&&(
        <div style={{position:'absolute',bottom:54,left:'50%',transform:'translateX(-50%)',background:'rgba(196,90,90,0.95)',padding:'7px 14px',borderRadius:8,fontSize:13,zIndex:30,cursor:'pointer',fontWeight:600,boxShadow:'0 4px 16px rgba(196,90,90,0.4)',border:'1px solid rgba(196,90,90,0.5)',display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}} onClick={()=>setBuildError(null)}>⚠ {buildError}</div>
      )}
      {/* Bottom Toolbar */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,display:'flex',alignItems:'center',gap:4,padding:'5px 10px',background:'rgba(8,8,11,0.94)',borderTop:'1px solid rgba(201,168,108,0.2)',zIndex:10,backdropFilter:'blur(12px)',boxShadow:'0 -2px 16px rgba(0,0,0,0.4)'}}>
        {/* Main actions */}
        <ToolBtn active={showBuild} onClick={()=>setShowBuild(b=>!b)} label="Build" shortcut="B"/>
        <ToolBtn active={showMarket} onClick={()=>setShowMarket(m=>!m)} label="Market" shortcut="M"/>
        <ToolBtn active={showAI} onClick={()=>setShowAI(a=>!a)} label="AI" color="#5a8ac4" shortcut="A"/>
        <ToolBtn active={showSave} onClick={()=>setShowSave(s=>!s)} label="Save" shortcut="S"/>
        <ToolBtn active={showPop} onClick={()=>setShowPop(p=>!p)} label="People" shortcut="P"/>
        <ToolBtn active={showLog} onClick={()=>setShowLog(l=>!l)} label="Log" shortcut="L"/>
        <div style={{width:1,height:20,background:'rgba(255,255,255,0.1)'}}/>
        {/* Gather zones */}
        <ToolBtn active={gatherType==='stone'} onClick={()=>handleGatherType('stone')} label="Stone" color="#9f9f9f"/>
        <ToolBtn active={gatherType==='iron'} onClick={()=>handleGatherType('iron')} label="Iron" color="#707070"/>
        <ToolBtn active={gatherType==='wood'} onClick={()=>handleGatherType('wood')} label="Wood" color="#4ea86d"/>
        <button className="btn btn-s btn-sm" onClick={()=>{handleClearGather('stone');handleClearGather('iron');handleClearGather('wood');}} style={{padding:'4px 7px',fontSize:10,borderRadius:'6px',fontWeight:500,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',color:'var(--fg3)'}}>Clear</button>
        <div style={{width:1,height:20,background:'rgba(255,255,255,0.1)'}}/>
        <ToolBtn active={workerPolicy==='natural_only'} onClick={handleToggleWorkerPolicy} label={workerPolicy==='natural_only'?'Natural':'All jobs'} color="#5ac480"/>
        {/* Zoom + back */}
        <div style={{margin:'0 auto',display:'flex',gap:3,alignItems:'center'}}>
          <button className="btn btn-s btn-sm" onClick={()=>{if(engineRef.current){const e=engineRef.current,nz=Math.min(e.maxZoom,e.zoom*1.25),cx=e.canvas.width/2,cy=e.canvas.height/2,wx=(cx+e.camX)/e.zoom,wy=(cy+e.camY)/e.zoom;e.zoom=nz;e.camX=wx*nz-cx;e.camY=wy*nz-cy;e._clampCam();}}} style={{padding:'3px 9px',fontSize:14,borderRadius:'5px',fontWeight:700,background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.12)',color:'var(--fg)',lineHeight:1}}>+</button>
          <button className="btn btn-s btn-sm" onClick={()=>{if(engineRef.current){const e=engineRef.current,nz=Math.max(e.minZoom,e.zoom*0.8),cx=e.canvas.width/2,cy=e.canvas.height/2,wx=(cx+e.camX)/e.zoom,wy=(cy+e.camY)/e.zoom;e.zoom=nz;e.camX=wx*nz-cx;e.camY=wy*nz-cy;e._clampCam();}}} style={{padding:'3px 9px',fontSize:14,borderRadius:'5px',fontWeight:700,background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.12)',color:'var(--fg)',lineHeight:1}}>−</button>
          <button className="btn btn-s btn-sm" onClick={onBack} style={{padding:'4px 10px',fontSize:10,borderRadius:'5px',fontWeight:500,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'var(--fg3)',marginLeft:2}}>← Back</button>
        </div>
      </div>
    </div>
  );
}

// ── BanishedApp ──────────────────────────────────────────────────────
function BanishedApp({user,onLogout,onUpdateUser}){
  const token=localStorage.getItem('mf_token');
  const [view,setView]=React.useState('lobby');
  const [gs,setGs]=React.useState(null);
  const [starting,setStarting]=React.useState(false);
  const newGame=async(mapParams)=>{
    setStarting(true);
    try{const d=await P(`/api/banished/game/new/`,{map_params:mapParams});setGs(d.state);setView('game');}
    catch(e){alert('Failed to create game: '+e.message);}
    setStarting(false);
  };
  const loadGame=state=>{setGs(state);setView('game');};
  if(starting)return(
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
      <div style={{color:'var(--gold)',fontSize:16}}>Generating world…</div>
      <div style={{color:'var(--fg3)',fontSize:12}}>Generating terrain, please wait</div>
    </div>
  );
  if(view==='lobby'||!gs)return<BanishedLobby onNewGame={newGame} onLoadGame={loadGame} onBack={()=>window.location.hash='#/'}/>;
  return(
    <BanishedToastProvider>
      <BanishedGameView initialState={gs} token={token} onBack={()=>setView('lobby')}/>
    </BanishedToastProvider>
  );
}
